- name: Install Borg backup utility and dependencies
  apt:
    name:
      - borgbackup
      - borgmatic
      - fuse
    state: latest

- name: Ensure Borg log file directory exists
  file:
    path: /var/log/borgbackup/
    state: directory
    owner: root
    group: adm
    mode: 0755

- name: Create Borg backup scripts
  template:
    src: "{{ item }}.j2"
    dest: "/root/bin/{{ item }}"
    owner: root
    group: root
    mode: 0700
  loop:
    - borgauto.sh
    - brestore.sh

- name: SSH - Install borg private key per machine
  template:
    src: secrets/ssh/borgkey-{{ ansible_hostname }}
    dest: /root/.ssh/borgkey
    owner: root
    group: root
    mode: 0600

- name: SSH - Install borg public key per machine
  template:
    src: secrets/ssh/borgkey-{{ ansible_hostname }}.pub
    dest: /root/.ssh/borgkey.pub
    owner: root
    group: root
    mode: 0600

- name: Ensure ch-s012.rsync.net's SSH host key is known
  known_hosts:
    name: ch-s012.rsync.net
    key: ch-s012.rsync.net ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIO5lfML3qjBiDXi4yh3xPoXPHqIOeLNp66P3Unrl+8g3
    path: /root/.ssh/known_hosts

- name: Disable old daily backups via cron
  file:
    state: absent
    #state: link
    #src: /root/bin/borgauto.sh
    dest: /etc/cron.daily/borgbackup

- name: Create borgmatic config directory
  file:
    path: /etc/borgmatic
    state: directory
    owner: root
    group: root
    mode: 0755

- name: Create borgmatic config directory
  file:
    path: /etc/borgmatic/credentials
    state: directory
    owner: root
    group: root
    mode: 0700

- name: Install borgmatic rsync.net credentials
  copy:
    content: "{{ borg_passphrase }}"
    dest: /etc/borgmatic/credentials/rsync.net.txt
    owner: root
    group: root
    mode: 0700

- name: Install borgmatic config
  copy:
    src: config.yaml
    dest: /etc/borgmatic/config.yaml
    #dest: /home/glass/borgmatic-config.yaml
    owner: root
    group: root
    mode: 0755
